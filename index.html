<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f12">
  <meta name="color-scheme" content="dark">
  <title>Unrot</title>
  <meta name="application-name" content="Unrot">
  <meta name="apple-mobile-web-app-title" content="Unrot">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <h1 class="wordmark">Unrot</h1>
      <input id="search" class="search" type="search" placeholder="search…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             aria-label="search the feed">
      <span id="status" class="status" aria-live="polite"></span>
    </div>
    <nav id="lanes" class="lanes" aria-label="lanes"></nav>
  </header>

  <main id="feed" class="feed" aria-live="polite"></main>
  <div id="sentinel" class="sentinel" aria-hidden="true"></div>
  <p id="tail" class="tail"></p>

  <script src="./app.js" defer></script>
</body>
</html>
